name: Update Scholar statistics

on:
  schedule:
    - cron: "17 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-scholar-statistics
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh Google Scholar metrics
        run: node scripts/update-scholar-stats.mjs

      - name: Commit changed metrics
        run: |
          if git diff --quiet -- assets/scholar-stats.js; then
            echo "Scholar metrics are unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/scholar-stats.js
          git commit -m "chore: update Google Scholar metrics"
          git push
